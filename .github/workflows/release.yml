name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 2.24.0)"
        required: true
        type: string
      release_notes:
        description: "Release notes (brief description of changes)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "Error: Version must be in format X.Y or X.Y.Z (e.g., 2.24.0)"
            exit 1
          fi

      - name: Check tag doesn't exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ inputs.version }}$"; then
            echo "Error: Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Validate Foundry release (dry-run)
        env:
          FOUNDRY_VTT_API_KEY: ${{ secrets.FOUNDRY_VTT_API_KEY }}
        run: |
          if [ -n "$FOUNDRY_VTT_API_KEY" ]; then
            npm run foundry:release -- --version "${{ inputs.version }}" --dry-run
          else
            echo "Skipping Foundry registry dry-run; FOUNDRY_VTT_API_KEY is not configured."
          fi

      - name: Update module.json
        run: |
          # Update version
          sed -i 's/"version": "[^"]*"/"version": "${{ inputs.version }}"/' module.json

          # Update release asset URLs
          sed -i 's|"manifest": "[^"]*"|"manifest": "https://github.com/${{ github.repository }}/releases/latest/download/module.json"|' module.json
          sed -i 's|"download": "[^"]*"|"download": "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/module.zip"|' module.json

          # Verify changes
          echo "Updated module.json:"
          grep -E '"version"|"manifest"|"download"' module.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.json
          git commit -m "Release v${{ inputs.version }}"

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          zip -r module.zip module.json popout.js lang LICENSE.txt README.md
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes "${{ inputs.release_notes }}" \
            module.json module.zip

      - name: Notify Foundry registry
        env:
          FOUNDRY_VTT_API_KEY: ${{ secrets.FOUNDRY_VTT_API_KEY }}
        run: |
          if [ -n "$FOUNDRY_VTT_API_KEY" ]; then
            npm run foundry:release -- --version "${{ inputs.version }}"
          else
            echo "Skipping Foundry registry notification; FOUNDRY_VTT_API_KEY is not configured."
          fi
